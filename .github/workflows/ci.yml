name: CI

# Runs on every push to any branch and on all pull requests targeting main.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ─── 1. Backend — pytest ──────────────────────────────────────────────────
  test-backend:
    name: Backend — pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Run pytest
        run: pytest --tb=short -v
        working-directory: backend
        env:
          # DB is mocked in conftest.py — no real Postgres needed.
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          SECRET_KEY: "ci-test-secret-key"
          # Make the `app` package importable from backend/
          PYTHONPATH: "."

  # ─── 2. Frontend — TypeScript build ──────────────────────────────────────
  build-frontend:
    name: Frontend — npm build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          # package-lock.json is generated by npm install below and then
          # committed; until it exists in the repo we fall back to package.json.
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        # npm install generates package-lock.json if missing; npm ci requires it.
        run: npm install
        working-directory: frontend

      - name: TypeScript check + Vite build
        run: npm run build
        working-directory: frontend

  # ─── 3. Docker — build both images ───────────────────────────────────────
  # Runs only after both test-backend and build-frontend pass.
  build-images:
    name: Docker — build images
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: cts-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: cts-frontend:${{ github.sha }}
          build-args: VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max
