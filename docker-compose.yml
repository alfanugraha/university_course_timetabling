services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: cts_user
      POSTGRES_PASSWORD: cts_password
      POSTGRES_DB: cts
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cts_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cts_user -d cts"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cts_network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build: ./frontend
    restart: unless-stopped
    networks:
      - cts_network

  proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - cts_network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  postgres_data:

networks:
  cts_network:
    driver: bridge
