upstream api_backend {
    server api:8000;
    keepalive 32;
}

upstream frontend_app {
    server frontend:3000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Buffer settings
    proxy_buffering on;
    proxy_buffer_size 8k;
    proxy_buffers 16 8k;
    proxy_busy_buffers_size 16k;

    # API routes — strip /api prefix before forwarding to FastAPI
    location /api/ {
        proxy_pass http://api_backend/;

        # Larger timeouts for long-running operations (conflict check, Excel import/export)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Allow large file uploads (Excel import)
        client_max_body_size 20M;
    }

    # Frontend — React SPA
    location / {
        proxy_pass http://frontend_app/;

        # WebSocket support (for Vite HMR in dev, harmless in prod)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health check endpoint (bypass to API)
    location /health {
        proxy_pass http://api_backend/health;
        access_log off;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;
    gzip_comp_level 5;
}
